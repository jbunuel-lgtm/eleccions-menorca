<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultats Electorals · Menorca</title>
<style>
:root {
  --bg: #f4f1eb;
  --ink: #161410;
  --surface: #fff;
  --border: #d6cfc2;
  --muted: #7a7468;
  --accent: #c0311a;
  --accent2: #1a4a88;
  --up: #1a6e30;
  --down: #c0311a;
  --font: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--font); min-height: 100vh; overflow-x: hidden; font-size: 14px; }

/* ── MASTHEAD ── */
.masthead {
  background: var(--ink);
  color: #fff;
  padding: 0 28px;
  display: grid;
  grid-template-columns: auto auto;
  align-items: stretch;
  border-bottom: 3px solid var(--accent);
  gap: 0;
}
.masthead-brand {
  padding: 18px 28px 18px 0;
  border-right: 1px solid rgba(255,255,255,.1);
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.masthead-eyebrow {
  font-size: .62rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 5px;
  font-weight: 500;
}
.masthead-title {
  font-size: 1.55rem;
  font-weight: 700;
  letter-spacing: -.02em;
  line-height: 1.15;
}
.masthead-title span { color: rgba(255,255,255,.32); font-weight: 400; }

/* ── MASTHEAD RIGHT ── */
.masthead-right {
  padding: 18px 0 18px 24px;
  border-left: 1px solid rgba(255,255,255,.1);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  gap: 7px;
}
.live-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff;
  font-size: .65rem; letter-spacing: .1em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 2px; font-weight: 600;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: blink 1.2s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.masthead-meta {
  font-size: .62rem;
  color: rgba(255,255,255,.38);
  text-align: right;
  line-height: 1.9;
  font-variant-numeric: tabular-nums;
}
.masthead-meta strong { color: rgba(255,255,255,.7); }

/* ── NAV TABS ── */
.nav-tabs {
  background: var(--ink);
  display: flex;
  padding: 0 28px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  font-size: .68rem; letter-spacing: .07em; text-transform: uppercase;
  padding: 12px 20px; border: none; background: none; cursor: pointer;
  color: rgba(255,255,255,.38); border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s; white-space: nowrap;
  font-weight: 500; font-family: var(--font);
}
.tab-btn:hover { color: rgba(255,255,255,.65); }
.tab-btn.active { color: #fff; border-bottom-color: var(--accent); }

/* ── MAIN ── */
.main-wrap { max-width: 1180px; margin: 0 auto; padding: 32px 28px 80px; }
.section-kicker { font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
.section-heading { font-size: 1.35rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 2px solid var(--ink); }

/* ── SCRUTINY CARD ── */
.scrut-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  padding: 18px 22px;
  margin-bottom: 20px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 20px;
  align-items: center;
}
.scrut-pct { font-size: 2.4rem; font-weight: 700; color: var(--accent2); letter-spacing: -.03em; line-height: 1; }
.scrut-pct small { font-size: 1.2rem; color: var(--muted); font-weight: 400; }
.scrut-sub { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 2px; font-weight: 500; }
.scrut-bar-label { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
.scrut-bar { height: 6px; background: #e8e3d8; }
.scrut-bar-fill { height: 100%; background: var(--accent2); transition: width 1.2s ease; }
.scrut-bar-info { font-size: .68rem; color: var(--muted); margin-top: 5px; }
.scrut-bar-info .live { color: var(--accent); font-weight: 600; }
.scrut-bar-info .done { color: var(--up); font-weight: 600; }
.scrut-right { text-align: right; }
.scrut-right-val { font-size: 1.3rem; font-weight: 700; letter-spacing: -.02em; }
.scrut-right-label { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 2px; font-weight: 500; }
.scrut-right-sub { font-size: .65rem; color: var(--muted); margin-top: 3px; }

/* ── RESULTS CARD ── */
.results-card { background: var(--surface); border: 1.5px solid var(--border); margin-bottom: 24px; overflow: hidden; }
.results-card-header { background: var(--ink); color: #fff; padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; }
.results-card-title { font-size: .82rem; font-weight: 700; letter-spacing: -.01em; }
.results-card-meta { font-size: .6rem; color: rgba(255,255,255,.42); letter-spacing: .04em; }
.table-head { display: grid; grid-template-columns: 2fr 88px 78px 1fr 110px; padding: 8px 18px; background: #f0ebe0; border-bottom: 1px solid var(--border); font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.table-row { display: grid; grid-template-columns: 2fr 88px 78px 1fr 110px; padding: 11px 18px; border-bottom: 1px solid var(--border); align-items: center; transition: background .12s; }
.table-row:last-child { border-bottom: none; }
.table-row:hover { background: #faf7f2; }
.party-cell { display: flex; align-items: center; gap: 9px; }
.party-swatch { width: 3px; height: 30px; flex-shrink: 0; }
.party-name { font-size: .85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.party-full { font-size: .65rem; color: var(--muted); margin-top: 1px; }
.votes-cell { font-size: .8rem; font-variant-numeric: tabular-nums; }
.pct-cell { font-size: .85rem; font-weight: 600; color: var(--accent2); font-variant-numeric: tabular-nums; }
.bar-cell { padding-right: 10px; }
.bar-wrap { height: 4px; background: #e8e3d8; }
.bar-fill { height: 100%; transition: width 1.2s cubic-bezier(.16,1,.3,1); }
.seats-cell { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
.seat { width: 9px; height: 9px; border-radius: 1px; }
.seats-num { font-size: .78rem; font-weight: 700; margin-left: 3px; font-variant-numeric: tabular-nums; }

/* ── TREND BADGES ── */
.trend { display: inline-flex; align-items: center; gap: 2px; font-size: .6rem; font-weight: 600; padding: 1px 4px; border-radius: 2px; }
.t-up { background: #daf0e0; color: var(--up); }
.t-dn { background: #fde8e4; color: var(--down); }
.t-eq { background: #ece8df; color: var(--muted); }
.t-new { background: #fff3cd; color: #7a5a00; }

/* ── HEMICICLE ── */
.hemicicle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 22px; }
.hemi-card { background: var(--surface); border: 1.5px solid var(--border); padding: 20px; }
.hemi-label { font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; font-weight: 500; }
.hemi-title { font-size: .9rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -.01em; }
svg.hemi { width: 100%; overflow: visible; }
.hemi-legend { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.hemi-legend-item { display: flex; align-items: center; gap: 4px; font-size: .62rem; color: var(--muted); }

/* ── CRITICAL CARD ── */
.critical-row { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.critical-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.critical-label { font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
.critical-val { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
.critical-sub { font-size: .65rem; color: var(--muted); margin-top: 2px; }

/* ── PARTS GRID ── */
.part-section { background: var(--surface); border: 1.5px solid var(--border); padding: 16px 20px; margin-bottom: 20px; }
.part-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.part-label { font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
.part-value { font-size: 1.4rem; font-weight: 700; letter-spacing: -.02em; line-height: 1; }
.part-sub { font-size: .65rem; color: var(--muted); margin-top: 2px; }
.part-bar { height: 3px; background: #e8e3d8; margin-top: 7px; }
.part-bar-fill { height: 100%; background: var(--accent2); }

/* ── MUNI TABLE ── */
.muni-table-wrap { overflow-x: auto; }
.muni-table { width: 100%; border-collapse: collapse; font-size: .75rem; }
.muni-table th { text-align: right; padding: 8px 10px; font-size: .57rem; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); font-weight: 600; background: #f0ebe0; border-bottom: 1px solid var(--border); white-space: nowrap; }
.muni-table th:first-child { text-align: left; padding-left: 16px; }
.muni-table th.scrut-th { color: var(--accent); }
.muni-table td { padding: 9px 10px; text-align: right; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
.muni-table td:first-child { text-align: left; padding-left: 16px; font-weight: 600; white-space: nowrap; }
.muni-table tr:nth-child(even) td { background: #faf7f2; }
.muni-table tr:hover td { background: #f5f0e6; }
.muni-table tr.total-row td { background: var(--ink); color: #fff; font-weight: 700; }
.muni-table tr.total-row td:first-child { font-weight: 700; }
.scrut-mini { font-size: .65rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.scrut-mini-bar { height: 2px; background: #e8e3d8; margin-top: 2px; }
.scrut-mini-fill { height: 100%; background: var(--accent2); }

/* ── SEATS BARS ── */
.seats-bar-item { margin-bottom: 8px; }
.seats-bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.seats-bar-name { font-size: .8rem; font-weight: 600; }
.seats-bar-val { font-size: .78rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.seats-bar-track { height: 7px; background: #e8e3d8; }
.seats-bar-fill { height: 100%; transition: width 1s ease; }

/* ── TABS ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── FOOTER ── */
.footer-bar { background: var(--ink); color: rgba(255,255,255,.32); font-size: .62rem; padding: 12px 28px; display: flex; justify-content: space-between; letter-spacing: .03em; }
.footer-bar strong { color: rgba(255,255,255,.6); }

/* ── ANIMATE ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.anim { animation: fadeUp .3s ease both; }

/* ── RESPONSIVE ── */
@media(max-width:720px){
  .masthead { grid-template-columns: 1fr; }
  .masthead-right { flex-direction: row; justify-content: space-between; padding: 12px 0 0; border-top: 1px solid rgba(255,255,255,.07); border-left: none; }
  .main-wrap { padding: 20px 14px 60px; }
  .hemicicle-row { grid-template-columns: 1fr; }
  .table-head,.table-row { grid-template-columns: 2fr 72px 68px; }
  .table-head>:nth-child(4),.table-head>:nth-child(5),
  .table-row>:nth-child(4),.table-row>:nth-child(5) { display: none; }
  .part-grid { grid-template-columns: repeat(2,1fr); }
  .scrut-card { grid-template-columns: auto 1fr; }
  .scrut-card>:last-child { display: none; }

}
</style>
</head>

<!-- ══ MASTHEAD ══ -->

  <div class="masthead-brand">

<script>
// ── CONFIG ──────────────────────────────────────────────────
const JSON_URL = 'https://script.google.com/macros/s/AKfycbxV7NG4QYnYxcpJtwjqaUeHTWaK7X4JbrLFqNg9einCXEhGqzHmeJr1vcFLFMl8B7Ct/exec';
const REFRESH_SECONDS = 60;

// ── COLORS ──────────────────────────────────────────────────
const C = {
  // ── Partits supramunicipals ──────────────────────────────
  PSOE:          '#c0311a',  // vermell
  'MÉS':         '#c8960a',  // groc daurat
  UP:            '#6d28d9',  // lila
  PP:            '#1a4a88',  // blau
  VOX:           '#3a7d44',  // verd
  Cs:            '#c86020',  // taronja
  PLIE:          '#b0a898',  // crema gris (sobre fons clar)
  // ── Candidatures locals: grisos diferenciats ─────────────
  'ARA MAÓ':     '#7a7a7a',  // gris mig
  ENTESA:        '#606060',  // gris fosc
  AVANCEM:       '#5a7060',  // gris verdós (MÉS+UP Alaior)
  VOLEM:         '#7a7a7a',  // gris
  SOM:           '#6a6a6a',  // gris
  PSM:           '#a07818',  // groc torrat (Ciutadella)
  'C. ENDAVANT': '#3a5a9a',  // blau grisós
  IPEC:          '#1a1410',  // negre
  XBALEARS:      '#4a6a8a',  // blau gris
};


// ── PARTY CONFIG ─────────────────────────────────────────────
// Per afegir una candidatura nova:
// 1. Afegeix-la a l'objecte C amb el color desitjat
// 2. Afegeix-la a IDEO_ORDER de l'elecció corresponent
// 3. Si substitueix una candidatura anterior, afegeix el mapatge a HIST_MAP
const PARTY_CONFIG = {
  // Ordre ideològic esq→dret per elecció
  IDEO_ORDER: {
    cime:      ['PSOE','MÉS','UP','VOX','Cs','PLIE','PP'],
    parlament: ['PSOE','UP','MÉS','VOX','Cs','PLIE','PP'],
    mao:       ['PSOE','ARA MAÓ','VOX','Cs','PP'],
    ciutadella:['PSOE','PSM','C. ENDAVANT','VOX','Cs','PLIE','PP'],
    alaior:    ['PSOE','AVANCEM','VOX','PP'],
    ferreries: ['PSOE','ENTESA','PP'],
    mercadal:  ['PSOE','ENTESA','PP'],
    santlluis: ['PSOE','VOLEM','XBALEARS','PP'],
    escastell: ['PSOE','SOM','IPEC','XBALEARS','PP'],
    migjorn:   ['PSOE','PP'],
  },
  // Mapatge històric: candidatura nova → candidatura anterior
  // (per comparar amb 28M 2023 encara que el nom hagi canviat)
  HIST_MAP: {
    // Exemple: 'NOM NOU': 'NOM ANTIC'
  }
};

// Assigna colors als partits provinents del JSON
function assignColors(partits) {
  partits.forEach(p => {
    if (!p.color) p.color = C[p.nom] || '#888';
  });
  return partits;
}

// Calcula D'Hondt complet al navegador (per a escó crític)
function calcHondt(partits, totalSeats, llindar) {
  const umbral = llindar || 0;
  const escons = {};
  const elegibles = partits.filter(p => p.vots >= umbral).map(p => p.nom);
  elegibles.forEach(n => escons[n] = 0);
  
  const quocients = []; // {parti, valor, escoNum}
  
  for (let i = 0; i < totalSeats; i++) {
    let maxVal = -1, guanyador = null;
    elegibles.forEach(n => {
      const p = partits.find(x => x.nom === n);
      const val = p.vots / (escons[n] + 1);
      if (val > maxVal) { maxVal = val; guanyador = n; }
    });
    if (guanyador) {
      escons[guanyador]++;
      quocients.push({parti: guanyador, valor: maxVal, escoNum: i + 1});
    }
  }
  
  // Darrer escó i a punt d'entrar
  const darrer = quocients[quocients.length - 1];
  
  // A punt: el millor quocient NO assignat
  let maxNextVal = -1, nextParti = null;
  elegibles.forEach(n => {
    const p = partits.find(x => x.nom === n);
    const val = p.vots / (escons[n] + 1);
    if (val > maxNextVal) { maxNextVal = val; nextParti = n; }
  });
  
  // Marge en vots reals (no quocients)
  // Per robar l'escó: nextParti necessita que vots_next/(escons_next+1) > vots_darrer/escons_darrer
  // vots_next_necessaris = (vots_darrer/escons_darrer) * (escons_next+1) + 1 - vots_next_actual
  let votesFalta = 0;
  if (darrer && nextParti) {
    const pDarrer = partits.find(x => x.nom === darrer.parti);
    const pNext = partits.find(x => x.nom === nextParti);
    if (pDarrer && pNext) {
      const threshold = pDarrer.vots / escons[darrer.parti];
      const needed = Math.ceil(threshold * (escons[nextParti] + 1)) - pNext.vots;
      votesFalta = Math.max(0, needed);
    }
  }
  
  return {
    escons,
    darrerEsco: darrer ? {parti: darrer.parti, valor: darrer.valor} : null,
    aPunt: nextParti ? {parti: nextParti, valor: maxNextVal, votesFalta} : null
  };
}

// ── CURRENT DATA ────────────────────────────────────────────
const CURRENT = {
  cime:{
    label:'Consell Insular de Menorca',totalSeats:13,
    totalMeses:182,mesasEscrutades:182,
    participation:'48,04%',cens:71736,
    partits:[
      {nom:'PP',    complet:'Partido Popular',    color:C.PP,   vots:15368,escons:6},
      {nom:'PSOE',  complet:'Partido Socialista', color:C.PSOE, vots:10547,escons:4},
      {nom:'MÉS',   complet:'MÉS per Menorca',    color:C['MÉS'],vots:6772,escons:2},
      {nom:'VOX',   complet:'Vox',                color:C.VOX,  vots:2420, escons:1},
      {nom:'UP',    complet:'Unides Podem',       color:C.UP,   vots:2388, escons:0},
      {nom:'Cs',    complet:'Ciudadanos',         color:C.Cs,   vots:520,  escons:0},
      {nom:'PLIE',  complet:'PLIE',               color:C.PLIE, vots:169,  escons:0},
    ],
    darrerEsco:{parti:'VOX',valor:2420},
    aPunt:{parti:'UP',valor:2388,votesFalta:32},
    municipis:[
      {nom:'Alaior',         meses:10,mesasEscr:10,part:'63,20%',cens:7024, vots:{PSOE:1124,PP:2047,'MÉS':604,UP:221,Cs:19,VOX:194,PLIE:7}},
      {nom:'Ciutadella',     meses:32,mesasEscr:32,part:'35,78%',cens:23234,vots:{PSOE:2419,PP:4505,'MÉS':2553,UP:718,Cs:255,VOX:703,PLIE:79}},

// ── HELPERS ─────────────────────────────────────────────────
const fN = n => Math.round(n).toLocaleString('ca-ES');
const pct = (v,t) => t>0 ? ((v/t)*100).toFixed(1) : '0.0';
const totV = ps => ps.reduce((s,p)=>s+p.vots,0);
const scrutPct = d => d.totalMeses>0 ? Math.round(d.mesasEscrutades/d.totalMeses*100) : 0;

function winner(partits) {
  return partits.reduce((a,b)=>a.vots>b.vots?a:b);
}

function trendV(nom, hist, cur) {
  const equiv = PARTY_CONFIG.HIST_MAP[nom] || nom;
  const h = hist[nom] !== undefined ? hist[nom] : hist[equiv];
  if(h===undefined) return `<span class="trend t-new">NOU</span>`;
  const d=cur-h;
  if(d>0)  return `<span class="trend t-up">▲+${fN(d)}</span>`;
  if(d<0)  return `<span class="trend t-dn">▼${fN(d)}</span>`;
  return `<span class="trend t-eq">=</span>`;
}
function trendS(nom, histS, cur) {
  const equiv = PARTY_CONFIG.HIST_MAP[nom] || nom;
  const h = histS && histS[nom] !== undefined ? histS[nom] : (histS && histS[equiv] !== undefined ? histS[equiv] : undefined);
  if(h===undefined) return '';
  const d=cur-h;
  if(d>0)  return `<span class="trend t-up" style="font-size:.58rem">▲${d}</span>`;
  if(d<0)  return `<span class="trend t-dn" style="font-size:.58rem">▼${Math.abs(d)}</span>`;
  return `<span class="trend t-eq" style="font-size:.58rem">=</span>`;
}

// ── HEMICICLE DOBLE ARC (ventall clàssic) ───────────────────
// Sectors dibuixats amb polígons (no arcs SVG) per garantir
// una forma de ventall/abanico perfecta.

function getIdeoOrder(key, partits) {
  const order = (PARTY_CONFIG.IDEO_ORDER || {})[key];
  if (!order) return partits.map(p => p.nom);
  return [...partits].sort((a, b) => {
    let ia = order.indexOf(a.nom), ib = order.indexOf(b.nom);
    if (ia < 0) ia = 999; if (ib < 0) ib = 999;
    return ia - ib;
  }).map(p => p.nom);
}

function drawHemi(svgId, partits, totalSeats, elKey) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  svg.innerHTML = '';

  const W = 400, H = 250;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const cx = W / 2, cy = H - 52;  // més espai per a les dues llegendes

  // Radis dels dos arcs
  const O_R1 = 115, O_R2 = 178;   // arc exterior (2027): gruixut
  const I_R1 = 48,  I_R2 = 105;   // arc interior (2023): gruixut
  const SPREAD = 170;              // graus del ventall (170° de 180° possibles)
  const START_DEG = 90 + SPREAD/2; // ~175°
  const END_DEG = 90 - SPREAD/2;   // ~5°
  const GAP = 1.5;                 // graus entre sectors

  const orderedNames = getIdeoOrder(elKey, partits);
  const ordered = orderedNames.map(n => partits.find(p => p.nom === n)).filter(Boolean);
  const hSeats = HIST_SEATS[elKey] || {};

  // ── Polar → Cartesià ──
  function xy(r, deg) {
    const rad = deg * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy - r * Math.sin(rad)];
  }

  // ── Dibuixa sector com a polígon (fiable, sense artefactes) ──
  function drawSector(r1, r2, fromDeg, toDeg, color, opacity) {
    if (Math.abs(fromDeg - toDeg) < 0.3) return;
    const pts = [];
    const steps = Math.max(24, Math.round(Math.abs(fromDeg - toDeg) * 1.5));
    // Arc exterior (fromDeg → toDeg)
    for (let i = 0; i <= steps; i++) {
      const d = fromDeg + (toDeg - fromDeg) * (i / steps);
      const [x, y] = xy(r2, d);
      pts.push(x.toFixed(1) + ',' + y.toFixed(1));
    }
    // Arc interior (toDeg → fromDeg, revers)
    for (let i = steps; i >= 0; i--) {
      const d = fromDeg + (toDeg - fromDeg) * (i / steps);
      const [x, y] = xy(r1, d);
      pts.push(x.toFixed(1) + ',' + y.toFixed(1));
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pts.join(' '));
    poly.setAttribute('fill', color);
    if (opacity < 1) poly.setAttribute('opacity', String(opacity));
    poly.setAttribute('stroke', 'rgba(255,255,255,.5)');
    poly.setAttribute('stroke-width', '1');
    svg.appendChild(poly);
  }

  // ── Text centrat dins un sector ──
  function sectorNum(r1, r2, fromDeg, toDeg, text, sizePx) {
    const midDeg = (fromDeg + toDeg) / 2;
    const midR = (r1 + r2) / 2;
    const [tx, ty] = xy(midR, midDeg);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', tx.toFixed(1));
    t.setAttribute('y', (ty + sizePx * 0.36).toFixed(1));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', sizePx);
    t.setAttribute('font-weight', '800');
    t.setAttribute('fill', '#fff');
    t.setAttribute('font-family', '-apple-system,Helvetica,Arial,sans-serif');
    t.textContent = text;
    svg.appendChild(t);
  }

  // Etiqueta exterior: nom del partit + % vots, al costat de l'arc exterior
  function sectorLabel(fromDeg, toDeg, nom, pct) {
    const sweep = fromDeg - toDeg;
    if (sweep < 8) return; // massa estret per posar etiqueta
    const midDeg = (fromDeg + toDeg) / 2;
    const labelR = O_R2 + 13;
    const [lx, ly] = xy(labelR, midDeg);
    // Ancoratge: esquerra si sector a la dreta del centre, dreta si a l'esquerra
    const anch = midDeg > 90 ? 'end' : midDeg < 90 ? 'start' : 'middle';

    // Nom del partit
    const tNom = document.createElementNS('http://www.w3.org/2000/svg','text');
    tNom.setAttribute('x', lx.toFixed(1));
    tNom.setAttribute('y', (ly - 3).toFixed(1));
    tNom.setAttribute('text-anchor', anch);
    tNom.setAttribute('font-size', '7.5');
    tNom.setAttribute('font-weight', '700');
    tNom.setAttribute('fill', 'rgba(26,20,16,.75)');
    tNom.setAttribute('font-family', '-apple-system,Helvetica,Arial,sans-serif');
    tNom.textContent = nom;
    svg.appendChild(tNom);

    // % vots
    if (pct) {
      const tPct = document.createElementNS('http://www.w3.org/2000/svg','text');
      tPct.setAttribute('x', lx.toFixed(1));
      tPct.setAttribute('y', (ly + 6).toFixed(1));
      tPct.setAttribute('text-anchor', anch);
      tPct.setAttribute('font-size', '7');
      tPct.setAttribute('font-weight', '500');
      tPct.setAttribute('fill', 'rgba(26,20,16,.45)');
      tPct.setAttribute('font-family', '-apple-system,Helvetica,Arial,sans-serif');
      tPct.textContent = pct;
      svg.appendChild(tPct);
    }
  }

  // ── Dibuixa un arc complet (tots els sectors) ──
  function renderArc(list, seatsFn, r1, r2, opacity, showLabels) {
    const total = list.reduce((s, p) => s + seatsFn(p), 0);
    if (total === 0) return [];
    const active = list.filter(p => seatsFn(p) > 0);
    const nGaps = Math.max(0, active.length - 1);
    const usable = SPREAD - GAP * nGaps;
    let deg = START_DEG;
    const secs = [];
    const totalVotsArc = list.reduce((s, p) => s + (p.vots || 0), 0);

    active.forEach(p => {
      const seats = seatsFn(p);
      const sweep = (seats / total) * usable;
      const endDeg = deg - sweep;
      drawSector(r1, r2, deg, endDeg, p.color || '#888', opacity);

      // Número dins el sector
      const thickness = r2 - r1;
      const arcLen = sweep * Math.PI / 180 * ((r1+r2)/2);
      const maxSize = Math.min(thickness * 0.55, arcLen * 0.7);
      const fontSize = Math.max(8, Math.min(22, Math.round(maxSize)));
      if (seats > 0) sectorNum(r1, r2, deg, endDeg, seats, fontSize);

      // Etiquetes exteriors: nom + % vots (només arc exterior)
      if (showLabels && totalVotsArc > 0 && p.vots > 0) {
        const pct = (p.vots / totalVotsArc * 100).toFixed(1) + '%';
        sectorLabel(deg, endDeg, p.nom, pct);
      }

      secs.push({nom: p.nom, color: p.color, from: deg, to: endDeg, seats});
      deg = endDeg - GAP;
    });
    return secs;
  }

  // ── ARC INTERIOR (2023, semitransparent) ──
  // Inclou TOTS els partits del 2023, en ordre ideològic
  const histList = (() => {
    const ideoOrd = PARTY_CONFIG.IDEO_ORDER[elKey] || [];
    const result = [];
    const afegits = new Set();

    // 1. Partits en ordre ideològic (2027 + equivalents del 2023)
    ideoOrd.forEach(n2027 => {
      const equiv = PARTY_CONFIG.HIST_MAP[n2027] || n2027;
      const seats = hSeats[n2027] !== undefined ? hSeats[n2027] : (hSeats[equiv] || 0);
      const p = ordered.find(x => x.nom === n2027);
      if (seats > 0) {
        result.push({
          nom: n2027,
          color: p ? p.color : (C[n2027] || C[equiv] || '#aaa'),
          escons: seats
        });
      }
      afegits.add(equiv);
    });

    // 2. Partits del 2023 que no apareixen a l'ordre ideològic del 2027
    // Els inserim en la posició correcta segons l'ordre ideològic global
    // Per ara els afegim al final si no hi són
    Object.keys(hSeats).forEach(n => {
      if (hSeats[n] > 0 && !afegits.has(n)) {
        result.push({nom: n, color: C[n] || '#aaa', escons: hSeats[n]});
      }
    });

    return result;
  })();
  renderArc(histList, p => p.escons, I_R1, I_R2, 0.4, false);

  // ── ARC EXTERIOR (2027) ──
  const outerSecs = renderArc(ordered, p => p.escons, O_R1, O_R2, 1.0, true);

  // ── LÍNIA DE MAJORIA ──
  const majority = Math.floor(totalSeats / 2) + 1;
  const totalCur = ordered.reduce((s, p) => s + p.escons, 0);

  if (totalCur > 0 && outerSecs.length > 0) {
    let cum = 0, majDeg = 90;
    for (const sec of outerSecs) {
      if (cum + sec.seats >= majority) {
        const frac = (majority - cum) / sec.seats;
        majDeg = sec.from - (sec.from - sec.to) * frac;
        break;
      }
      cum += sec.seats;
    }
    const [x1, y1] = xy(I_R1 - 8, majDeg);
    const [x2, y2] = xy(O_R2 + 8, majDeg);
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1',x1.toFixed(1)); ln.setAttribute('y1',y1.toFixed(1));
    ln.setAttribute('x2',x2.toFixed(1)); ln.setAttribute('y2',y2.toFixed(1));
    ln.setAttribute('stroke','rgba(0,0,0,.3)');
    ln.setAttribute('stroke-dasharray','6,4');
    ln.setAttribute('stroke-width','1.8');
    svg.appendChild(ln);

    const [lx, ly] = xy(O_R2 + 16, majDeg);
    const anch = majDeg > 90 ? 'end' : 'start';
    [{t:'majoria',dy:-3,sz:8,fw:'700',op:.35},{t:majority+' escons',dy:7,sz:7,fw:'500',op:.25}].forEach(l => {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',lx.toFixed(1)); t.setAttribute('y',(ly+l.dy).toFixed(1));
      t.setAttribute('text-anchor',anch); t.setAttribute('font-size',l.sz);
      t.setAttribute('font-weight',l.fw); t.setAttribute('fill',`rgba(0,0,0,${l.op})`);
      t.setAttribute('font-family','-apple-system,Helvetica,Arial,sans-serif');
      t.textContent = l.t; svg.appendChild(t);
    });
  }

  // ── ETIQUETES "2027" i "2023" ──
  [{r1:O_R1,r2:O_R2,txt:'2027',sz:10,fw:'700',op:.45},
   {r1:I_R1,r2:I_R2,txt:'2023',sz:8,fw:'600',op:.3}].forEach(l => {
    const midR = (l.r1 + l.r2) / 2;
    const [lx, ly] = xy(midR, START_DEG + 4);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',lx.toFixed(1)); t.setAttribute('y',ly.toFixed(1));
    t.setAttribute('text-anchor','end'); t.setAttribute('font-size',l.sz);
    t.setAttribute('font-weight',l.fw); t.setAttribute('fill',`rgba(0,0,0,${l.op})`);
    t.setAttribute('font-family','-apple-system,Helvetica,Arial,sans-serif');
    t.textContent = l.txt; svg.appendChild(t);
  });

  // ── LLEGENDA: dues línies ──────────────────────────────────
  function legendRow(items, ly, alpha, fontSize) {
    if (!items.length) return;
    const itemW = Math.min(72, (W - 32) / items.length);
    const totalW = items.length * itemW;
    const startX = (W - totalW) / 2;
    items.forEach((p, i) => {
      const lx = startX + i * itemW;
      const sz = parseInt(fontSize);
      const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
      r.setAttribute('x', lx.toFixed(1)); r.setAttribute('y', (ly - sz + 1).toFixed(1));
      r.setAttribute('width', (sz - 1).toString()); r.setAttribute('height', (sz - 1).toString());
      r.setAttribute('rx', '2'); r.setAttribute('fill', p.color || '#888');
      r.setAttribute('opacity', alpha);
      svg.appendChild(r);
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', (lx + sz + 2).toFixed(1)); t.setAttribute('y', ly.toFixed(1));
      t.setAttribute('font-size', fontSize); t.setAttribute('font-weight', '600');
      t.setAttribute('fill', `rgba(26,20,16,${alpha})`);
      t.setAttribute('font-family', '-apple-system,Helvetica,Arial,sans-serif');
      t.textContent = p.nom + ' (' + p.escons + ')';
      svg.appendChild(t);
    });
  }

  // Ordenació: més escons primer; a igualtat, més vots
  function sortBySeats(items) {
    return [...items].sort((a, b) => b.escons - a.escons || (b.vots||0) - (a.vots||0));
  }

  const ideoOrder = PARTY_CONFIG.IDEO_ORDER[elKey] || [];

  // Línia 1: partits 2027 amb escons, ordenats per escons desc
  const leg2027raw = (ideoOrder.length > 0
    ? ideoOrder.map(n => ordered.find(p => p.nom === n)).filter(p => p && p.escons > 0)
    : ordered.filter(p => p.escons > 0));
  const leg2027 = sortBySeats(leg2027raw);

  // Línia 2: tots els partits del 2023, ordenats per escons desc
  const hist2023raw = [];
  const nomsCobertosLeg = new Set();
  ideoOrder.forEach(n2027 => {
    const equiv = PARTY_CONFIG.HIST_MAP[n2027] || n2027;
    const seats = hSeats[n2027] !== undefined ? hSeats[n2027] : (hSeats[equiv] || 0);
    if (seats > 0) {
      const p = ordered.find(x => x.nom === n2027);
      hist2023raw.push({nom: n2027, escons: seats, color: p ? p.color : (C[n2027] || C[equiv] || '#aaa'), vots: p ? (p.vots||0) : 0});
      nomsCobertosLeg.add(equiv);
    }
  });
  Object.keys(hSeats).forEach(n => {
    if (hSeats[n] > 0 && !nomsCobertosLeg.has(n)) {
      hist2023raw.push({nom: n, escons: hSeats[n], color: C[n] || '#aaa', vots: 0});
    }
  });
  const hist2023 = sortBySeats(hist2023raw);

  const LY1 = H - 26;
  const LY2 = H - 11;

  function yearLabel(txt, ly, alpha, fw) {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', '4'); t.setAttribute('y', ly.toFixed(1));
    t.setAttribute('font-size', '6.5'); t.setAttribute('font-weight', fw || '700');
    t.setAttribute('fill', `rgba(26,20,16,${alpha})`);
    t.setAttribute('font-family', '-apple-system,Helvetica,Arial,sans-serif');
    t.textContent = txt; svg.appendChild(t);
  }

  yearLabel('2027', LY1, 0.6, '700');
  legendRow(leg2027, LY1, '1', '8.5');
  yearLabel('2023', LY2, 0.35, '600');
  legendRow(hist2023, LY2, '0.45', '7');
}

// ── MUNI DESGLOSSAT TABLE ───────────────────────────────────
function renderMuniTable(municipis, keys, cid, histVotesTotal, histVotesMuni) {
  const el=document.getElementById(cid);
  if(!el||!municipis) return;
  let html=`<div class="results-card anim"><div class="results-card-header">
    <span class="results-card-title">Resultats per municipi</span>
    <span class="results-card-meta">Vots i % per candidatura · ▲▼ vs. 28M 2023</span>
  </div><div class="muni-table-wrap"><table class="muni-table"><thead><tr>
    <th>Municipi</th><th class="scrut-th">Escrutat</th><th>Part.</th>`;
  keys.forEach(k=>{ html+=`<th style="color:${C[k]||'var(--muted)'}">${k}</th>`; });
  html+=`</tr></thead><tbody>`;

  // Mapatge explícit nom municipi → clau interna
  const MUNI_KEY_MAP = {
    'alaior': 'alaior', 'ciutadella': 'ciutadella', 'ferreries': 'ferreries',
    'maó': 'mao', 'mao': 'mao', 'es mercadal': 'mercadal', 'mercadal': 'mercadal',
    'sant lluís': 'santlluis', 'santlluis': 'santlluis',
    'es castell': 'escastell', 'escastell': 'escastell',
    'es migjorn gran': 'migjorn', 'migjorn': 'migjorn',
  };
  const muniKey = nom => {
    const n = nom.toLowerCase().trim();
    return MUNI_KEY_MAP[n] || n.replace(/\s+/g,'').replace(/[àá]/g,'a')
      .replace(/[èé]/g,'e').replace(/[íï]/g,'i').replace(/[òó]/g,'o')
      .replace(/[úü]/g,'u').replace(/ç/g,'c').replace(/·/g,'').replace(/'/g,'');
  };

  function voteArrow(vAct, vHist) {
    if (vHist === null || vHist === undefined) return '';
    if (vAct === 0 && vHist === 0) return '';
    const d = vAct - vHist;
    if (d > 0) return `<span class="trend t-up" style="font-size:.5rem;margin-left:2px">▲</span>`;
    if (d < 0) return `<span class="trend t-dn" style="font-size:.5rem;margin-left:2px">▼</span>`;
    return `<span class="trend t-eq" style="font-size:.5rem;margin-left:2px">=</span>`;
  }

  municipis.forEach((m,ri)=>{
    const tot=Object.values(m.vots).reduce((a,b)=>a+b,0);
    const w=Object.entries(m.vots).sort((a,b)=>b[1]-a[1])[0];
    const sp=m.meses>0?Math.round(m.mesasEscr/m.meses*100):0;
    const mk = muniKey(m.nom);
    const histMuni = histVotesMuni && histVotesMuni[mk] ? histVotesMuni[mk] : null;

    html+=`<tr><td>
      <span style="display:inline-block;width:7px;height:7px;background:${C[w[0]]||'#aaa'};border-radius:50%;margin-right:6px;vertical-align:middle"></span>${m.nom}
    </td><td style="text-align:center">
      <div class="scrut-mini" style="color:${sp>=100?'var(--up)':'var(--accent2)'}">${sp}%</div>
      <div class="scrut-mini-bar"><div class="scrut-mini-fill" style="width:${sp}%"></div></div>
      <div style="font-size:.58rem;color:var(--muted)">${m.mesasEscr}/${m.meses}</div>
    </td><td style="color:var(--muted);font-size:.68rem">${m.part}</td>`;
    keys.forEach(k=>{
      const v=m.vots[k]||0;
      const p=tot>0?((v/tot)*100).toFixed(1):'0.0';
      const isW=w[0]===k;
      // Fletxa exacta per municipi si tenim dades; sinó per total
      const vHist = histMuni ? histMuni[k] : null;
      const arrow = vHist !== null && vHist !== undefined ? voteArrow(v, vHist) : '';
      html+=`<td style="${isW?`font-weight:700;color:${C[k]||'inherit'}`:''}">${fN(v)}${arrow}<br><span style="font-size:.6rem;color:var(--muted)">${p}%</span></td>`;
    });
    html+=`</tr>`;
  });

  // Totals
  const tots={};
  keys.forEach(k=>{ tots[k]=municipis.reduce((s,m)=>s+(m.vots[k]||0),0); });
  const gt=Object.values(tots).reduce((a,b)=>a+b,0);
  const tM=municipis.reduce((s,m)=>s+(m.meses||0),0);
  const tE=municipis.reduce((s,m)=>s+(m.mesasEscr||0),0);
  const spT=tM>0?Math.round(tE/tM*100):0;
  html+=`<tr class="total-row"><td>TOTAL MENORCA</td>
    <td style="text-align:center;font-size:.68rem">${spT}%<br><span style="opacity:.5;font-size:.6rem">${tE}/${tM}</span></td>
    <td style="opacity:.4">—</td>`;
  keys.forEach(k=>{
    const v=tots[k], p=gt>0?((v/gt)*100).toFixed(1):'0.0';
    const vHist = histVotesTotal ? histVotesTotal[k] : null;
    const arrow = vHist !== null && vHist !== undefined ? voteArrow(v, vHist) : '';
    html+=`<td>${fN(v)}${arrow}<br><span style="font-size:.6rem;opacity:.5">${p}%</span></td>`;
  });
  html+=`</tr></tbody></table></div></div>`;
  el.innerHTML=html;
}

// ── RIGHT CARD: Repartiment + Escrutini crític ───────────────
function renderRightCard(key, data, histSeats) {
  const el = document.getElementById('right-card-' + key);
  if (!el) return;
  const total = data.totalSeats;
  const ambEscons = data.partits.filter(p => p.escons > 0);

  // Calcula D'Hondt al navegador per obtenir darrerEsco/aPunt
  const totalVots = totV(data.partits);
  const llindar = Math.round(totalVots * 0.05);
  let hondt = null;
  if (totalVots > 0) {
    hondt = calcHondt(data.partits, total, llindar);
  }

  // Secció 1: Repartiment
  let html = `
    <div class="hemi-label">Repartiment</div>
    <div class="hemi-title" style="margin-bottom:12px">Escons per candidatura</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">`;

  ambEscons.forEach(p => {
    const hS   = histSeats && histSeats[p.nom] !== undefined ? histSeats[p.nom] : null;
    const hMap = PARTY_CONFIG.HIST_MAP[p.nom];
    const hSm  = hS !== null ? hS : (hMap && histSeats && histSeats[hMap] !== undefined ? histSeats[hMap] : null);
    const diff = hSm !== null ? p.escons - hSm : null;
    const ds   = diff === null ? ''
      : diff > 0  ? `<span class="trend t-up" style="font-size:.55rem">▲${diff}</span>`
      : diff < 0  ? `<span class="trend t-dn" style="font-size:.55rem">▼${Math.abs(diff)}</span>`
      :              `<span class="trend t-eq" style="font-size:.55rem">=</span>`;
    const w = (p.escons / total * 100).toFixed(0);
    html += `
      <div class="seats-bar-item">
        <div class="seats-bar-top">
          <span class="seats-bar-name" style="display:flex;align-items:center;gap:5px">
            <span style="width:8px;height:8px;background:${p.color};border-radius:1px;flex-shrink:0;display:inline-block"></span>
            ${p.nom}
          </span>
          <span class="seats-bar-val" style="color:${p.color}">${p.escons} ${ds}</span>
        </div>
        <div class="seats-bar-track">
          <div class="seats-bar-fill" style="background:${p.color};width:${w}%"></div>
        </div>
      </div>`;
  });
  html += `</div>`;

  // Divisor
  html += `<div style="border-top:1.5px solid var(--border);margin-bottom:12px"></div>`;

  // Secció 2: Escrutini crític — SEMPRE amb D'Hondt calculat
  html += `
    <div class="hemi-label">Escrutini crític</div>
    <div class="hemi-title" style="margin-bottom:10px">Darrer escó i marge</div>`;

  if (hondt && hondt.darrerEsco) {
    const dp = data.partits.find(p => p.nom === hondt.darrerEsco.parti);
    const ap = hondt.aPunt ? data.partits.find(p => p.nom === hondt.aPunt.parti) : null;
    html += `
      <div class="critical-row">
        <div class="critical-label">Últim escó assignat a</div>
        <div class="critical-val" style="color:${dp ? dp.color : 'inherit'}">
          <span style="display:inline-block;width:10px;height:10px;background:${dp?dp.color:'#888'};border-radius:2px;margin-right:5px;vertical-align:middle"></span>
          ${hondt.darrerEsco.parti}
          <span style="font-size:.72rem;color:var(--muted);font-weight:400;margin-left:4px">${fN(hondt.darrerEsco.valor)} pts</span>
        </div>
      </div>`;
    if (ap) {
      html += `
      <div class="critical-row">
        <div class="critical-label">A punt d'aconseguir-lo</div>
        <div class="critical-val" style="color:${ap ? ap.color : 'inherit'}">
          <span style="display:inline-block;width:10px;height:10px;background:${ap?ap.color:'#888'};border-radius:2px;margin-right:5px;vertical-align:middle"></span>
          ${hondt.aPunt.parti}
          <span style="font-size:.72rem;color:var(--muted);font-weight:400;margin-left:4px">${fN(hondt.aPunt.valor)} pts</span>
        </div>
        <div class="critical-sub">Marge: <strong style="color:var(--accent)">${fN(hondt.aPunt.votesFalta)}</strong> vots de diferència</div>
      </div>`;
    }
    html += `
      <div class="critical-row" style="margin-top:8px">
        <div class="critical-label">Majoria necessària</div>
        <div class="critical-val">${Math.floor(total / 2) + 1} escons</div>
      </div>`;
  } else {
    html += `
      <div class="critical-row">
        <div class="critical-label" style="color:var(--muted)">Sense dades encara</div>
      </div>`;
  }

  el.innerHTML = html;
}

// ── MUNICIPAL PANEL ──────────────────────────────────────────
function renderMuniPanel(key, data) {
  const el=document.getElementById('panel-'+key);
  if(!el) return;

  let scrutHTML = '';
  try { scrutHTML = scrutCardHTML(data); } catch(e) { scrutHTML = '<div style="color:red">Error scrut: '+e.message+'</div>'; }

  el.innerHTML=`
    <div class="section-kicker">Ajuntament · Resultats</div>
    <div class="section-heading">${data.label||key}</div>
    ${scrutHTML}
    <div class="hemicicle-row">
      <div class="hemi-card anim">
        <div class="hemi-label">Distribució de regidors</div>
        <div class="hemi-title">${data.totalSeats} regidors · D'Hondt</div>
        <svg class="hemi" viewBox="0 0 400 250" id="hemi-${key}"></svg>
      </div>
      <div class="hemi-card anim" id="right-card-${key}"></div>
    </div>
    <div class="results-card anim">
      <div class="results-card-header">
        <span class="results-card-title">Resultats per candidatura</span>
        <span class="results-card-meta">${data.totalSeats} regidors · ▲▼ vs. 28M 2023</span>
      </div>
      <div class="table-head"><div>Candidatura</div><div>Vots</div><div>%</div><div>Representació</div><div>Regidors</div></div>
      <div id="rows-${key}"></div>
    </div>`;

  try { renderRows(data.partits,'rows-'+key,HIST_VOTES[key],HIST_SEATS[key],key); }
  catch(e) { console.error(key+' renderRows:',e.message); }

  try { drawHemi('hemi-'+key,data.partits,data.totalSeats,key); }
  catch(e) { console.error(key+' drawHemi:',e.message); }

  try { renderRightCard(key, data, HIST_SEATS[key]); }
  catch(e) { console.error(key+' renderRightCard:',e.message); }
}

// ── TAB SWITCH ───────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const btn=[...document.querySelectorAll('.tab-btn')].find(b=>b.getAttribute('onclick').includes("'"+id+"'"));
  if(btn) btn.classList.add('active');
  const panel=document.getElementById('panel-'+id);
  if(panel) panel.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── CLOCK & COUNTDOWN ────────────────────────────────────────
function updateClock() {
  const n=new Date(), t=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  ['clock-val','footer-time'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent=t; });
}
let cdSecs=REFRESH_SECONDS;
function startCountdown() {
  setInterval(()=>{
    cdSecs--;
    if(cdSecs<0){ cdSecs=REFRESH_SECONDS; loadData().then(renderAll); }
    const m=Math.floor(cdSecs/60),s=cdSecs%60;
    const e=document.getElementById('countdown-val');
    if(e) e.textContent=m+':'+String(s).padStart(2,'0');
  },1000);
}

// ── DATA LOAD ────────────────────────────────────────────────
async function loadData() {
  if(!JSON_URL) return CURRENT;
  try { const r=await fetch(JSON_URL); return await r.json(); }
  catch(e) { console.warn('Using demo data',e); return CURRENT; }
}

async function renderAll(raw) {
  // Suporta tant el format nou {eleccions, config} com l'antic {cime, parlament, ...}
  const data = raw.eleccions || raw;
  const cfg  = raw.config || {};

  // Aplica configuració del full CONFIG del Sheet (colors, ordre, equiv)
  if (Object.keys(cfg).length > 0) {
    Object.keys(cfg).forEach(elKey => {
      try {
        if (!data[elKey] || !data[elKey].partits) return;
        const cfgList = cfg[elKey];
        if (!cfgList || !cfgList.length) return;
        data[elKey].partits.forEach(p => {
          const cfgP = cfgList.find(c => c.nom === p.nom);
          if (cfgP) p.color = cfgP.color;
          else if (!p.color) p.color = C[p.nom] || '#888';
        });
        PARTY_CONFIG.IDEO_ORDER[elKey] = cfgList.map(c => c.nom);
        cfgList.forEach(c => {
          if (c.equiv && c.equiv !== c.nom) PARTY_CONFIG.HIST_MAP[c.nom] = c.equiv;
          C[c.nom] = c.color;
        });
      } catch(e) { console.warn('Config error for', elKey, e.message); }
    });
  } else {
    Object.keys(data).forEach(k => {
      if (data[k] && data[k].partits) assignColors(data[k].partits);
    });
  }

  try { renderSupraPanel('cime', data.cime); } catch(e) { console.error('CIME error:',e.message); }
  try { renderSupraPanel('parlament', data.parlament); } catch(e) { console.error('PARL error:',e.message); }

  ['mao','ciutadella','alaior','ferreries','mercadal','santlluis','escastell','migjorn'].forEach(k=>{
    if (!data[k]) return;
    try { renderMuniPanel(k, data[k]); }
    catch(e) {
      console.error('Error '+k+':', e.message);
      const el=document.getElementById('panel-'+k);
      if(el) el.innerHTML=`<div style="padding:30px;color:red"><b>Error ${k}:</b> ${e.message}</div>`;
    }
  });
}

document.addEventListener('DOMContentLoaded', async ()=>{
  updateClock(); setInterval(updateClock,30000);
  const data=await loadData();
  await renderAll(data);
  startCountdown();
});
</script>
